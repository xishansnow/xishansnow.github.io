# 如果Front-matter的cover或上述列表中的图片不存在，则显示默认错误图片
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# A simple 404 page
error_404:
  enable: true
  subtitle: 'Page Not Found'
  background: https://gitee.com/XiShanSnow/imagebed/raw/master/images/page_404_01.png


post_meta:
  page: # Page页面参数配置
    date_type: created # created or updated or both 显示page创建日期还是更新日期，或者两者都显示
    date_format: date # date/relative page上显示日期，还是相对日期
    categories: true # true or false page上是否显示分类信息
    tags: false # true or false page上是否显示标签信息
    label: true # true or false page上是否显示分类信息是否显示lable文字
  post: # post页面参数配置
    date_type: both # created or updated or both 显示post创建日期还是更新日期，或者两者都显示
    date_format: date # date/relative post上显示日期，还是相对日期
    categories: true # true or false post上是否显示分类信息
    tags: true # true or false post上是否显示标签信息
    label: true # true or false post上是否显示label文字

# wordcount (字数统计)
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Display the article introduction on homepage
# 1: description
# 2: both (if the description exists, it will show description, or show the auto_excerpt)
# 3: auto_excerpt (default)
# false: do not show the article introduction
index_post_content:
  method: 3
  length: 500 # if you set method to 2 or 3, the length need to config

# ------------------------------------------------------------------------------------------------------------博文页面设置-------------------------
# Post （博文页面配置）
# --------------------------------------

# toc (目录设置)
toc:
  enable: true
  number: false
  style_simple: true

post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Sponsor/reward
# 打赏
reward:
  enable: false
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: wechat
    # - img: /img/alipay.jpg
    #   link:
    #   text: alipay

# 编辑贴文
# Post edit
# Easily browse and edit blog source code online.
post_edit:
  enable: false
  # url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # For example: https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url:

# 相关贴文
# Related Articles
related_post:
  enable: true
  limit: 6 # Number of posts displayed
  date_type: created # or created or updated 文章日期顯示創建日或者更新日

# 是否显示图片描述文字
# figcaption (圖片描述文字)
photofigcaption: false

# post_pagination (分頁)
# value: 1 || 2 || false
# 1: The 'next post' will link to old post
# 2: The 'next post' will link to new post
# false: disable pagination
post_pagination: 1

# 锚点
# anchor
# when you scroll in post, the URL will update according to header id.
anchor: false

# Displays outdated notice for a post (文章過期提醒)
noticeOutdate:
  enable: false
  style: flat # style: simple/flat
  limit_day: 500 # When will it be shown
  position: top # position: top/bottom
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.


